<!DOCTYPE html>
<html>
<head>
    <title>Books</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1>Book Management</h1>

<form id="bookForm">

    <input
        type="text"
        id="title"
        placeholder="Book Title"
        required
    >

    <input
        type="text"
        id="author"
        placeholder="Author"
        required
    >

    <input
        type="number"
        id="quantity"
        placeholder="Quantity"
        required
    >

    <button type="submit">
        Add Book
    </button>

</form>

<hr>

<h2>Books List</h2>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Author</th>
            <th>Quantity</th>
        </tr>
    </thead>

    <tbody id="bookTable"></tbody>

</table>

<script src="js/books.js"></script>

</body>
</html>
