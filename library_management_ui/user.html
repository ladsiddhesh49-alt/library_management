<!DOCTYPE html>
<html>
<head>
    <title>Users</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h2>Add User</h2>

<form id="userForm">

    <input type="text"
           id="name"
           placeholder="Enter Name"
           required>

    <input type="email"
           id="email"
           placeholder="Enter Email"
           required>

    <button type="submit">
        Add User
    </button>

</form>

<h2>Users List</h2>

<ul id="userList"></ul>

<script src="js/app.js"></script>

</body>
</html>
